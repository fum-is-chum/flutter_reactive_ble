name: scallop_flutter_reactive_ble
description: Reactive Bluetooth Low Energy (BLE) plugin that can communicate with multiple devices
version: 5.4.1
homepage: https://github.com/fum-is-chum/flutter_reactive_ble
repository: https://github.com/fum-is-chum/flutter_reactive_ble
documentation: https://github.com/fum-is-chum/flutter_reactive_ble

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

flutter:
  plugin:
    platforms:
      android:
        default_package: scallop_reactive_ble_mobile
      ios:
        default_package: scallop_reactive_ble_mobile

dependencies:
  collection: ^1.15.0
  flutter:
    sdk: flutter
  functional_data: ^1.0.0
  meta: ^1.3.0
  scallop_reactive_ble_mobile: ^5.4.1
  scallop_reactive_ble_platform_interface: ^5.4.1

dependency_overrides:
  scallop_reactive_ble_mobile:
    path: ../reactive_ble_mobile
  scallop_reactive_ble_platform_interface:
    path: ../reactive_ble_platform_interface

dev_dependencies:
  build_runner: ^2.3.3
  flutter_lints: ^1.0.4
  flutter_test:
    sdk: flutter
  functional_data_generator: ^1.1.2
  mockito: ^5.0.14
  
