name: scallop_reactive_ble_mobile
description: Official Android and iOS implementation for the flutter_reactive_ble plugin.
version: 6.0.2
homepage: https://github.com/fum-is-chum/flutter_reactive_ble
repository: https://github.com/fum-is-chum/flutter_reactive_ble
documentation: https://github.com/fum-is-chum/flutter_reactive_ble/tree/master/packages/reactive_ble_mobile

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  protobuf: ^6.0.0
  scallop_reactive_ble_platform_interface: ^6.0.1

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0

flutter:
  plugin:
    platforms:
      android:
        package: com.signify.hue.flutterreactiveble
        pluginClass: ReactiveBlePlugin
      ios:
        pluginClass: ReactiveBlePlugin
        sharedDarwinSource: true
      macos:
        pluginClass: ReactiveBlePlugin
        sharedDarwinSource: true  
